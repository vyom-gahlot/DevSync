<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient -->
    <linearGradient id="devsyncGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background (transparent by default) -->

  <!-- Code Editor Window -->
  <rect x="56" y="80" width="400" height="260" rx="20" fill="#0F172A"/>

  <!-- Window Controls -->
  <circle cx="90" cy="110" r="6" fill="#EF4444"/>
  <circle cx="110" cy="110" r="6" fill="#F59E0B"/>
  <circle cx="130" cy="110" r="6" fill="#10B981"/>

  <!-- Left Code Lines -->
  <rect x="90" y="150" width="120" height="6" rx="3" fill="url(#devsyncGradient)"/>
  <rect x="90" y="180" width="180" height="6" rx="3" fill="#9CA3AF"/>
  <rect x="90" y="210" width="140" height="6" rx="3" fill="url(#devsyncGradient)"/>
  <rect x="90" y="240" width="200" height="6" rx="3" fill="#9CA3AF"/>

  <!-- Divider -->
  <rect x="256" y="140" width="2" height="120" fill="#334155"/>

  <!-- Right Code Lines -->
  <rect x="280" y="150" width="100" height="6" rx="3" fill="#9CA3AF"/>
  <rect x="280" y="180" width="140" height="6" rx="3" fill="url(#devsyncGradient)"/>
  <rect x="280" y="210" width="120" height="6" rx="3" fill="#9CA3AF"/>
  <rect x="280" y="240" width="160" height="6" rx="3" fill="url(#devsyncGradient)"/>

  <!-- DevSync Text -->
  <text 
    x="256" 
    y="400" 
    text-anchor="middle" 
    font-family="Inter, Arial, sans-serif" 
    font-size="44" 
    font-weight="600"
    fill="#0F172A">
    Dev<tspan fill="url(#devsyncGradient)">Sync</tspan>
  </text>
</svg>